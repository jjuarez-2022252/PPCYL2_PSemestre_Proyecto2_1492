<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - PPCYL2-AcadNet</title>
</head>
<body>
    <h1>Login del Sistema</h1>

    {% if error %}
        <p style="color:red;"><strong>{{ error }}</strong></p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <p>
            <label for="{{ form.username.id_for_label }}">Usuario:</label><br>
            {{ form.username }}
        </p>

        <p>
            <label for="{{ form.password.id_for_label }}">Contraseña:</label><br>
            {{ form.password }}
        </p>

        <button type="submit">Iniciar sesión</button>
    </form>
</body>
</html>
